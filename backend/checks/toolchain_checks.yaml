---
# =============================================================================
# EASM Toolchain Checks — CHK-173 bis CHK-210
# Erweiterung der bestehenden palo_alto_top172_checks.yaml
#
# Kategorien:
#   easm_discovery  — Subfinder + theHarvester
#   easm_portscan   — Naabu (SYN-Scan, UDP)
#   easm_http       — HTTPX (Endpoints, CORS, Screenshots)
