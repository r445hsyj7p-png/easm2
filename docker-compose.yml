# =============================================================================
# EASM MSSP Platform — docker-compose.yml
# Ein Befehl startet alles: docker compose up -d
#
# Services:
#   frontend        React SPA (Vite + Nginx)
#   api             FastAPI REST Backend
#   worker-scan     Celery: Scan-Pipeline (Subfinder/Naabu/HTTPX/Nuclei/Ramparts)
#   worker-hibp     Celery: HIBP Credential-Checks (rate-limited)
#   worker-alerts   Celery: Notifications + Report-Generierung
#   scheduler       Celery Beat: Zeitgesteuerte Scans
#   postgres        PostgreSQL 16 mit Row-Level Security
#   redis           Redis 7: Celery Broker + Cache
#   traefik         Reverse Proxy + automatisches TLS (Let's Encrypt)
#   flower          Celery Monitoring Dashboard
#   prometheus      Metriken-Sammlung
#   grafana         Metriken-Dashboards
#   docs            Docusaurus Dokumentation
# =============================================================================

x-env: &env
  DATABASE_URL: postgresql://${POSTGRES_USER:-easm}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-easm}
  REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-please-set-a-real-secret-key-in-env}
  HIBP_API_KEY: ${HIBP_API_KEY:-}
  VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
  SHODAN_API_KEY: ${SHODAN_API_KEY:-}
  SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
  CENSYS_API_ID: ${CENSYS_API_ID:-}
  CENSYS_API_SECRET: ${CENSYS_API_SECRET:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  SCAN_CONCURRENCY: ${SCAN_CONCURRENCY:-4}
  NAABU_RATE: ${NAABU_RATE:-1000}
  HTTPX_SCREENSHOTS: ${HTTPX_SCREENSHOTS:-true}

x-common: &common
  restart: unless-stopped
  networks:
    - easm
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-worker-base: &worker-base
  build:
    context: ./backend
    dockerfile: ../docker/Dockerfile.worker
  image: easm-worker:latest
  environment:
    <<: *env
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - screenshots:/app/screenshots
    - reports:/app/reports
    - nuclei_templates:/root/nuclei-templates
    - tool_tmp:/tmp/easm
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  <<: *common


services:

  # ── Reverse Proxy + TLS ────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: easm-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--api.dashboard=false"
      - "--log.level=WARN"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/certs
    networks:
      - easm
    restart: unless-stopped

  # ── Frontend (React SPA) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    image: easm-frontend:latest
    container_name: easm-frontend
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    <<: *common

  # ── API (FastAPI) ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.api
    image: easm-api:latest
    container_name: easm-api
    environment:
      <<: *env
      UVICORN_WORKERS: "4"
      LOG_LEVEL: "info"
    volumes:
      - reports:/app/reports
      - screenshots:/app/screenshots
      - user_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *common

  # ── Celery Worker: Scan-Pipeline ───────────────────────────────────────────
  worker-scan:
    <<: *worker-base
    container_name: easm-worker-scan
    command: >
      celery -A workers.toolchain_tasks worker
      --loglevel=info
      --concurrency=${SCAN_CONCURRENCY:-4}
      --queues=scans,http,vuln,mcp
      --hostname=scan@%h
    cap_add:
      - NET_RAW
      - NET_ADMIN
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ── Celery Worker: HIBP Credential-Checks ─────────────────────────────────
  worker-hibp:
    <<: *worker-base
    container_name: easm-worker-hibp
    command: >
      celery -A workers.toolchain_tasks worker
      --loglevel=info
      --concurrency=2
      --queues=hibp
      --hostname=hibp@%h

  # ── Celery Worker: Alerts + Reports ───────────────────────────────────────
  worker-alerts:
    <<: *worker-base
    container_name: easm-worker-alerts
    command: >
      celery -A workers.toolchain_tasks worker
      --loglevel=info
      --concurrency=4
      --queues=alerts,maintenance,reports
      --hostname=alerts@%h

  # ── Celery Beat Scheduler ─────────────────────────────────────────────────
  scheduler:
    <<: *worker-base
    container_name: easm-scheduler
    command: celery -A workers.toolchain_tasks beat --loglevel=info
    volumes:
      - celery_beat:/app/celerybeat

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: easm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-easm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-easm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./infra/postgres/02_rls.sql:/docker-entrypoint-initdb.d/02_rls.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *common

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: easm-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *common

  # ── Flower (Celery Monitoring) ────────────────────────────────────────────
  flower:
    <<: *worker-base
    container_name: easm-flower
    command: >
      celery -A workers.toolchain_tasks flower
      --port=5555
      --basic_auth=${FLOWER_BASIC_AUTH:-admin:admin}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.${APP_DOMAIN}`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: easm-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    <<: *common

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: easm-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN:-grafana.${APP_DOMAIN}}
      GF_INSTALL_PLUGINS: "grafana-clock-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN:-grafana.${APP_DOMAIN}}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    <<: *common

  # ── Docs (Docusaurus) ─────────────────────────────────────────────────────
  docs:
    build:
      context: ./docs
      dockerfile: ../docker/Dockerfile.docs
    image: easm-docs:latest
    container_name: easm-docs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docs.rule=Host(`${DOCS_DOMAIN:-docs.${APP_DOMAIN}}`)"
      - "traefik.http.routers.docs.entrypoints=websecure"
      - "traefik.http.routers.docs.tls.certresolver=letsencrypt"
      - "traefik.http.services.docs.loadbalancer.server.port=80"
    <<: *common


  # ── Backup (täglich 03:00 UTC) ────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: easm-backup
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: |
      sh -c 'while true; do
        sleep 86400
        pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/easm_$$(date +%Y%m%d_%H%M%S).sql.gz
        find /backups -name "*.sql.gz" -mtime +30 -delete
        echo "[backup] Backup completed: $$(date)"
      done'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - easm
    restart: unless-stopped


networks:
  easm:
    driver: bridge

volumes:
  user_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  reports:
    driver: local
  screenshots:
    driver: local
  nuclei_templates:
    driver: local
  tool_tmp:
    driver: local
  celery_beat:
    driver: local
  certs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  backups:
    driver: local
